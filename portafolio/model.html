<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Modeling</title>
    <link rel="stylesheet" href="../src/visormodel.css">

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
</head>

<body>

    <h1 style="text-align:center; font-family:sans-serif; margin-top:20px;">
        INTERIOR
    </h1>

    <model-viewer 
        alt="Scene 3d" 
        src="../src/models/glb/interior.glb" 
        shadow-intensity="1" 
        ar 
        camera-controls
        touch-action="pan-y">

        <button slot="ar-button" id="ar-button">
            View in your space
        </button>

        <div id="ar-prompt">
            <img src="../src/img/hand.png">
        </div>

        <button id="ar-failure">
            AR is not tracking!
        </button>

        <!-- SLIDER -->
        <div class="slider">
            <div class="slides">

                <button class="slide selected" onclick="switchSrc(this, 'interior')"
                    style="background-image: url('../src/img/interior.png');">
                </button>

                <button class="slide" onclick="switchSrc(this, 'pantallaemierda')"
                    style="background-image: url('../src/img/pantalla.png');">
                </button>

                <button class="slide" onclick="switchSrc(this, 'sofademierda')"
                    style="background-image: url('../src/img/sofa.png');">
                </button>

            </div>
        </div>

    </model-viewer>

    <script type="module">
        const modelViewer = document.querySelector("model-viewer");

        window.switchSrc = (element, name) => {
            const base = "../src/models/glb/" + name;
            modelViewer.src = base + '.glb';

            const slides = document.querySelectorAll(".slide");
            slides.forEach((el) => el.classList.remove("selected"));
            element.classList.add("selected");
        };

        document.querySelector(".slider").addEventListener('beforexrselect', (ev) => {
            ev.preventDefault();
        });
    </script>

</body>

</html>
