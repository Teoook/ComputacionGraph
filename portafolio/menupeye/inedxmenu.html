<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavModel Animado</title>
    <style>
        :root {
            --bg-color: #000000;
            --blob-opacity: 0.5;
            
            --glass-bg: rgba(30, 30, 35, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: rgba(0, 0, 0, 0.8);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --glass-caustic: rgba(255, 255, 255, 0.05);
            --reflection-start: rgba(255, 255, 255, 0.15);
            --reflection-end: rgba(255, 255, 255, 0.0);
            --glare-color: rgba(255, 255, 255, 0.15);
            
            --pill-bg: rgba(60, 60, 65, 0.8);
            --pill-shadow: 0 4px 12px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.2), inset 0 1px 1px rgba(255,255,255,0.2);
            --icon-color: rgba(255, 255, 255, 0.5);
            --icon-active: #ffffff;
            --divider: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: transparent;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .bg-mesh {
            position: absolute; inset: 0; z-index: -1;
            background: var(--bg-color);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: var(--blob-opacity);
            animation: float 20s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .blob-1 { width: 50vw; height: 50vw; top: -10%; left: -10%; background: rgb(191,90,242); }
        .blob-2 { width: 45vw; height: 45vw; bottom: -10%; right: -10%; background: rgb(10,132,255); }
        .blob-3 { width: 35vw; height: 35vw; top: 30%; left: 40%; background: rgb(255,55,95); }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(5%, 10%) scale(1.05) rotate(5deg); }
            66% { transform: translate(-5%, 5%) scale(0.95) rotate(-5deg); }
            100% { transform: translate(0, -10%) scale(1.1) rotate(0deg); }
        }

        .liquid-nav {
            position: relative;
            display: flex; align-items: center; padding: 8px; border-radius: 99px;
            background: var(--glass-bg);
            backdrop-filter: blur(50px) saturate(200%);
            box-shadow: 0 40px 80px -20px var(--glass-shadow),
                        0 10px 30px -10px var(--glass-shadow),
                        inset 0 2px 3px -1px var(--glass-highlight),
                        inset 0 -2px 4px -1px var(--glass-caustic),
                        inset 0 0 0 1px var(--glass-border);
            z-index: 10;
        }

        .liquid-nav::before {
            content: '';
            position: absolute; top: 1px; left: 1px; right: 1px; height: 46%;
            border-radius: 99px 99px 24px 24px / 99px 99px 12px 12px;
            background: linear-gradient(180deg, var(--reflection-start) 0%, var(--reflection-end) 100%);
        }

        .liquid-glare-container { position: absolute; inset: 0; border-radius: 99px; overflow: hidden; pointer-events: none; }
        .liquid-glare { position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s ease; background: radial-gradient(circle 90px at var(--x, 50%) var(--y, 50%), var(--glare-color), transparent); }
        .liquid-nav:hover .liquid-glare { opacity: 1; }

        .nav-items { position: relative; display: flex; gap: 4px; z-index: 3; }
        .active-pill { position: absolute; top: 0; left: 0; height: 44px; background: var(--pill-bg); border-radius: 99px; box-shadow: var(--pill-shadow); transition: transform 0.5s cubic-bezier(0.34,1.2,0.64,1), width 0.5s cubic-bezier(0.34,1.2,0.64,1); }
        .nav-btn { position: relative; background: transparent; border: none; padding: 0 20px; height: 44px; border-radius: 99px; font-weight: 600; color: var(--icon-color); cursor: pointer; z-index: 2; }
        .nav-btn.active { color: var(--icon-active); }
    </style>
</head>
<body>

<div class="bg-mesh">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<nav class="liquid-nav" id="nav">
    <div class="liquid-glare-container">
        <div class="liquid-glare" id="glare"></div>
    </div>

    <div class="nav-items">
        <div class="active-pill" id="active-pill"></div>

        <button class="nav-btn active">Home</button>
        <button class="nav-btn">Call</button>
        <button class="nav-btn">List</button>
    </div>
</nav>

<!-- AUDIO AUTOMÁTICO -->
<audio id="bg-music" loop>
    <source src="/src/sounds/14-2 maqueta.mp3.mpeg" type="audio/mpeg">
</audio>

<script>
const nav = document.getElementById("nav");
const glare = document.getElementById("glare");
const navButtons = document.querySelectorAll(".nav-btn");
const activePill = document.getElementById("active-pill");

// Actualiza la posición del pill
function updatePill(btn) {
    activePill.style.width = `${btn.offsetWidth}px`;
    activePill.style.transform = `translateX(${btn.offsetLeft}px)`;
}

navButtons.forEach(btn => {
    btn.addEventListener("click", () => {
        navButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        updatePill(btn);
    });
});

updatePill(document.querySelector(".active"));

// Glare del mouse
nav.addEventListener("mousemove", (e) => {
    const rect = nav.getBoundingClientRect();
    glare.style.setProperty("--x", `${e.clientX - rect.left}px`);
    glare.style.setProperty("--y", `${e.clientY - rect.top}px`);
});

// AUDIO
const audio = document.getElementById("bg-music");
audio.volume = 0.1;
function startMusic() {
    audio.play().catch(()=>{});
    document.removeEventListener("click", startMusic);
}
document.addEventListener("click", startMusic);

// BLOBS ANIMADOS CON COLOR FLUIDO
const blobs = [
    document.querySelector('.blob-1'),
    document.querySelector('.blob-2'),
    document.querySelector('.blob-3')
];

function randomColor() {
    const r = 100 + Math.floor(Math.random() * 156);
    const g = 100 + Math.floor(Math.random() * 156);
    const b = 100 + Math.floor(Math.random() * 156);
    return `rgb(${r}, ${g}, ${b})`;
}

function animateBlobs() {
    blobs.forEach(blob => {
        blob.style.transition = 'background 10s linear';
        blob.style.background = randomColor();
    });
}

// Cambia color suavemente cada 10 segundos
setInterval(animateBlobs, 10000);
animateBlobs(); // inicio inmediato
</script>

</body>
</html>
